name: Build, test CVE and publish image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_PLATFORMS: linux/amd64,linux/arm64
  TRIVY_IMAGE: aquasec/trivy:0.70.0

jobs:
  cve-test:
    name: Build image and test CVE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare image names
        id: vars
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Repository variable DOCKERHUB_USERNAME is not configured."
            exit 1
          fi
          echo "ghcr_image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "cache_image=docker.io/${DOCKERHUB_USERNAME,,}/zad2-cache" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub for registry cache
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build linux/amd64 image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/zad2-linux-amd64.tar
          cache-from: type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-amd64
          cache-to: type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-amd64,mode=max

      - name: CVE test linux/amd64 image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/trivy
          docker run --rm \
            -v /tmp:/tmp \
            -v "$PWD/.cache/trivy:/root/.cache/" \
            "$TRIVY_IMAGE" image \
            --input /tmp/zad2-linux-amd64.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --scanners vuln

      - name: Build linux/arm64 image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/zad2-linux-arm64.tar
          cache-from: type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-arm64
          cache-to: type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-arm64,mode=max

      - name: CVE test linux/arm64 image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/trivy
          docker run --rm \
            -v /tmp:/tmp \
            -v "$PWD/.cache/trivy:/root/.cache/" \
            "$TRIVY_IMAGE" image \
            --input /tmp/zad2-linux-arm64.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --scanners vuln

  publish:
    name: Publish multi-platform image to GHCR
    runs-on: ubuntu-latest
    needs: cve-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare image names
        id: vars
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Repository variable DOCKERHUB_USERNAME is not configured."
            exit 1
          fi
          echo "ghcr_image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "cache_image=docker.io/${DOCKERHUB_USERNAME,,}/zad2-cache" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub for registry cache
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.ghcr_image }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},priority=900
            type=semver,pattern={{major}}.{{minor}},priority=800
            type=sha,format=short,prefix=sha-,priority=700

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-amd64
            type=registry,ref=${{ steps.vars.outputs.cache_image }}:linux-arm64
            type=registry,ref=${{ steps.vars.outputs.cache_image }}:buildcache
          cache-to: type=registry,ref=${{ steps.vars.outputs.cache_image }}:buildcache,mode=max
